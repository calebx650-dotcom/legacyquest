name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploys the built site to a gh-pages branch. GitHub auto-enables Pages
# (source: deploy from branch) when a gh-pages branch is created, which
# avoids needing the Pages-admin permission the default workflow token lacks.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Prevent Jekyll processing on Pages so all built assets serve as-is.
      - run: touch dist/.nojekyll
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
